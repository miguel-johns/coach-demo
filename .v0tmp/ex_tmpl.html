
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"ccd0c0b7-e377-46d2-807a-8771233f0bb4\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<style>/* ============================================================\n * Milton — Core Tokens  v2\n * Colors, typography, spacing, radii, shadows, motion.\n * Single source of truth; load this on every page.\n *\n * Derived from: brand poster (v0.1) + observed product screenshots\n * captured 2026-04-19. Any design outside of these tokens is\n * off-brand.\n * ============================================================ */\n\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ============================================================\n   * 1. CORE PALETTE\n   * ============================================================ */\n\n  /* Teal — primary brand. Deep teal buttons, headers, the turtle-face.\n     The teal gets darker and more saturated in product than the poster. */\n  --teal-900: #0C5060;\n  --teal-800: #0E5D70;   /* primary button, canvas hero BG */\n  --teal-700: #176B7C;\n  --teal-600: #2A8897;\n  --teal-500: #4BA3AE;\n  --teal-400: #7DBEC4;\n  --teal-300: #A9D3D6;\n  --teal-200: #CFE6E6;   /* pill background, avatar chips */\n  --teal-100: #E4F0F0;\n  --teal-050: #F0F7F7;\n\n  /* Green — success, progress, primary Milton bubble, attendance rings */\n  --green-800: #2F7E3E;\n  --green-700: #3FA053;\n  --green-600: #51B565;\n  --green-500: #6ECB74;   /* chart bars, \"+\" badge, achievements */\n  --green-400: #92DC94;\n  --green-300: #B5EAB1;\n  --green-200: #D4F1CE;\n  --green-100: #E8F7E3;\n  --green-050: #F3FAEF;\n\n  /* Ink — neutrals. Slightly warmer than pure gray, pulls toward teal. */\n  --ink-950: #0B1417;\n  --ink-900: #1A2327;    /* display text */\n  --ink-800: #242D31;\n  --ink-700: #3F4A4E;    /* body text */\n  --ink-600: #5E6A6E;\n  --ink-500: #7D8789;    /* captions, placeholders */\n  --ink-400: #9FA8AB;\n  --ink-300: #C2CACC;\n  --ink-200: #DEE4E5;    /* borders */\n  --ink-150: #EBEEEF;\n  --ink-100: #F3F5F6;    /* app BG */\n  --ink-050: #F9FAFA;    /* subtle wash */\n  --white:   #FFFFFF;\n  --black:   #0B1417;\n\n  /* ============================================================\n   * 2. ACCENT RAMP — Canvas templates, workflow categories,\n   *    chart series, avatars. Each accent has a tint (bg) + solid (fg).\n   *    These are DECORATIVE only — never use for status/state.\n   * ============================================================ */\n\n  /* Peach / coral — used for \"Daily Brief\" template, avatar (Sarah Chen) */\n  --accent-peach-500: #E87560;\n  --accent-peach-200: #F9D7CF;\n  --accent-peach-100: #FDE8E2;\n  /* Red — \"Today's Workout\" template, urgent */\n  --accent-red-500:   #E14D4D;\n  --accent-red-200:   #F9C8C8;\n  --accent-red-100:   #FDDCDC;\n  /* Violet — \"Progress Report\", AI Engine, \"Meetings\" in schedule */\n  --accent-violet-500: #8B5CF6;\n  --accent-violet-200: #DCCFFB;\n  --accent-violet-100: #EDE4FE;\n  /* Blue — \"Exercise Program\", \"Session Today\" pill, body-comp charts */\n  --accent-blue-500:   #3F88F2;\n  --accent-blue-200:   #C7DDFB;\n  --accent-blue-100:   #E2ECFD;\n  /* Green-accent — \"Nutrition Log\" — same family as primary green */\n  /* Pink — \"Recipe View\" template */\n  --accent-pink-500:   #E7539B;\n  --accent-pink-200:   #F9C5DD;\n  --accent-pink-100:   #FCDEEB;\n  /* Teal-accent — \"Meal Selection\" — same family as primary teal */\n  /* Amber — \"Back Office\" in schedule, nutrition accents */\n  --accent-amber-500:  #E89C3A;\n  --accent-amber-200:  #F7DBA8;\n  --accent-amber-100:  #FCEDD2;\n  /* Slate — \"Work Hours\", tertiary chips */\n  --accent-slate-500:  #7788A0;\n  --accent-slate-200:  #CBD2DC;\n  --accent-slate-100:  #E4E8EE;\n\n  /* ============================================================\n   * 3. SEMANTIC — use these for state/status, not accents.\n   * ============================================================ */\n\n  /* Success — On Track, Active, Engaged, goal-hit */\n  --sem-success-fg:  #2D7D3E;\n  --sem-success-bg:  #E2F3DF;\n  --sem-success-mid: var(--green-600);\n\n  /* Warning — Needs Attention, Flagged, Anomaly */\n  --sem-warn-fg:  #9A6409;\n  --sem-warn-bg:  #FDEECC;\n  --sem-warn-mid: var(--accent-amber-500);\n\n  /* Danger — Missed, Needs Programming, Conflict, Assessment Due */\n  --sem-danger-fg:  #A4302E;\n  --sem-danger-bg:  #FBE1DE;\n  --sem-danger-mid: var(--accent-red-500);\n\n  /* Info — Session Today, Client pill, generic informational */\n  --sem-info-fg:  #1F5BA8;\n  --sem-info-bg:  #DCE8F9;\n  --sem-info-mid: var(--accent-blue-500);\n\n  /* Brand / AI — violet for AI-engine / rule / copilot-attributed */\n  --sem-brand-fg:  #6A3FD7;\n  --sem-brand-bg:  var(--accent-violet-100);\n  --sem-brand-mid: var(--accent-violet-500);\n\n  /* ============================================================\n   * 4. SURFACE + TEXT ALIASES — the names you USE most often.\n   * ============================================================ */\n\n  --fg-1: var(--ink-900);          /* display + headers */\n  --fg-2: var(--ink-700);          /* body text */\n  --fg-3: var(--ink-500);          /* captions, eyebrows, tertiary */\n  --fg-4: var(--ink-400);          /* disabled */\n  --fg-on-dark:  var(--white);\n  --fg-on-brand: var(--white);\n  --fg-brand:    var(--teal-800);  /* inline brand words */\n  --fg-accent:   var(--green-700); /* links, progress, active chips */\n  --fg-accent-ink: var(--teal-800);/* in-text accent (Sarah's \"20 lbs\") */\n\n  --bg-app:       var(--ink-100);  /* app background */\n  --bg-canvas:    var(--ink-050);  /* canvas/workspace BG */\n  --bg-1:         var(--white);    /* card surface */\n  --bg-2:         var(--ink-100);  /* subtle inset */\n  --bg-3:         var(--ink-200);  /* deeper inset */\n  --bg-brand:     var(--teal-800); /* primary buttons */\n  --bg-brand-deep:var(--teal-900);\n  --bg-hero-dark: var(--ink-900);  /* black canvas hero cards */\n\n  --border-subtle: var(--ink-150);\n  --border-soft:   var(--ink-200);\n  --border-strong: var(--ink-400);\n  --border-focus:  var(--teal-800);\n\n  /* ============================================================\n   * 5. DATA CATEGORIES — used across dashboards, heatmap legend,\n   *    exercise-program chips. Each has a solid + tint.\n   * ============================================================ */\n\n  --data-workout:   var(--teal-800);   /* \"Workout\" legend, green heatmap */\n  --data-nutrition: var(--accent-red-500);\n  --data-sleep:     var(--accent-violet-500);\n  --data-steps:     var(--accent-blue-500);\n  --data-activity:  var(--accent-amber-500);\n  --data-hydration: var(--accent-blue-500);\n\n  --data-workout-bg:   var(--teal-100);\n  --data-nutrition-bg: var(--accent-red-100);\n  --data-sleep-bg:     var(--accent-violet-100);\n  --data-steps-bg:     var(--accent-blue-100);\n  --data-activity-bg:  var(--accent-amber-100);\n\n  /* ============================================================\n   * 6. MESSAGE BUBBLE — signature Milton gradient\n   * ============================================================ */\n\n  --grad-milton-bubble: linear-gradient(180deg, var(--teal-700) 0%, var(--teal-800) 100%);\n  --grad-user-bubble:   linear-gradient(180deg, var(--ink-100) 0%, var(--ink-150) 100%);\n  /* AI / Copilot \"you said\" quote — violet left border */\n  --grad-ai-quote: linear-gradient(90deg, rgba(139,92,246,.08), rgba(139,92,246,0));\n\n  /* ============================================================\n   * 7. TYPOGRAPHY\n   *   Milton uses Lexend. That's the whole wordmark; never sub.\n   * ============================================================ */\n\n  --font-sans: 'Lexend', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  --text-2xs:  11px;\n  --text-xs:   12px;\n  --text-sm:   13px;\n  --text-md:   14px;\n  --text-base: 15px;    /* product body default */\n  --text-lg:   17px;\n  --text-xl:   20px;\n  --text-2xl:  24px;    /* card title / canvas H2 */\n  --text-3xl:  32px;\n  --text-4xl:  40px;\n  --text-5xl:  56px;    /* stat hero */\n\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  --leading-tight:  1.1;\n  --leading-snug:   1.25;\n  --leading-body:   1.5;\n  --leading-loose:  1.65;\n\n  /* ============================================================\n   * 8. SPACING — 4px grid, use 4/8/12/16/20/24 most often\n   * ============================================================ */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 28px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* ============================================================\n   * 9. RADII\n   * ============================================================ */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:  12px;     /* default card */\n  --radius-lg:  16px;     /* large card, canvas dashboard */\n  --radius-xl:  20px;\n  --radius-2xl: 28px;     /* canvas hero, modal */\n  --radius-pill: 999px;\n\n  /* ============================================================\n   * 10. SHADOWS  — teal-tinted, never pure black\n   * ============================================================ */\n  --shadow-xs:  0 1px 2px rgba(14, 93, 112, .06);\n  --shadow-sm:  0 1px 3px rgba(14, 93, 112, .08), 0 1px 2px rgba(14, 93, 112, .04);\n  --shadow-md:  0 4px 12px rgba(14, 93, 112, .10);\n  --shadow-lg:  0 12px 32px rgba(14, 93, 112, .14);\n  --shadow-xl:  0 28px 60px rgba(14, 93, 112, .20);\n  --shadow-card: 0 1px 0 rgba(14,93,112,.04), 0 2px 8px rgba(14,93,112,.06);\n  --shadow-ring-soft: 0 0 0 1px rgba(14, 93, 112, .06);\n\n  /* ============================================================\n   * 11. MOTION\n   * ============================================================ */\n  --ease-out: cubic-bezier(.2, .8, .2, 1);\n  --ease-in-out: cubic-bezier(.4, 0, .2, 1);\n  --dur-fast: 120ms;\n  --dur-mid:  220ms;\n  --dur-slow: 400ms;\n\n  /* ============================================================\n   * 12. FOCUS\n   * ============================================================ */\n  --ring: 0 0 0 2px var(--white), 0 0 0 4px var(--teal-800);\n}\n\n/* ============================================================\n * BASE RESET\n * ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-body);\n  color: var(--fg-1);\n  background: var(--bg-1);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbutton { font-family: inherit; }\n\n/* ============================================================\n * SEMANTIC TYPE\n * ============================================================ */\n\n.display, h1.display {\n  font-size: var(--text-5xl);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: -.025em;\n  color: var(--fg-1);\n}\nh1, .h1 {\n  font-size: var(--text-4xl);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: -.02em;\n  margin: 0;\n}\nh2, .h2 {\n  font-size: var(--text-3xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  letter-spacing: -.015em;\n  margin: 0;\n}\nh3, .h3 {\n  font-size: var(--text-2xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-snug);\n  letter-spacing: -.01em;\n  margin: 0;\n}\nh4, .h4 {\n  font-size: var(--text-xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\nh5, .h5 {\n  font-size: var(--text-lg);\n  font-weight: var(--weight-medium);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\n\n.body, p {\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  line-height: var(--leading-body);\n  color: var(--fg-2);\n  margin: 0;\n}\n.body-lg { font-size: var(--text-lg); line-height: 1.55; color: var(--fg-2); }\n.body-sm, small {\n  font-size: var(--text-sm);\n  line-height: 1.5;\n  color: var(--fg-2);\n}\n.caption {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-medium);\n  line-height: 1.4;\n  color: var(--fg-3);\n}\n.eyebrow {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n.eyebrow--brand { color: var(--fg-brand); }\n\n.mono, code {\n  font-family: var(--font-mono);\n  font-size: .93em;\n  background: var(--bg-2);\n  padding: 2px 6px;\n  border-radius: var(--radius-xs);\n  color: var(--fg-1);\n}\n.num { font-variant-numeric: tabular-nums; }\n\na {\n  color: var(--fg-accent);\n  text-decoration: none;\n  font-weight: var(--weight-medium);\n  transition: color var(--dur-fast) var(--ease-out);\n}\na:hover { color: var(--teal-800); }\n\n/* ============================================================\n * BUTTONS\n * ============================================================ */\n\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-2);\n  padding: 10px 18px;\n  border-radius: var(--radius-pill);\n  font-family: var(--font-sans);\n  font-size: var(--text-md);\n  font-weight: var(--weight-semibold);\n  line-height: 1;\n  border: 0;\n  cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out),\n              box-shadow var(--dur-fast) var(--ease-out),\n              transform var(--dur-fast) var(--ease-out),\n              color var(--dur-fast) var(--ease-out);\n  white-space: nowrap;\n  text-decoration: none;\n}\n.btn--sm { padding: 6px 12px; font-size: var(--text-sm); }\n.btn--lg { padding: 14px 24px; font-size: var(--text-lg); }\n\n.btn--primary {\n  background: var(--teal-800);\n  color: var(--white);\n  box-shadow: var(--shadow-sm);\n}\n.btn--primary:hover { background: var(--teal-700); box-shadow: var(--shadow-md); }\n.btn--primary:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }\n\n.btn--dark {\n  background: var(--ink-900);\n  color: var(--white);\n}\n.btn--dark:hover { background: var(--ink-800); }\n\n.btn--secondary {\n  background: var(--white);\n  color: var(--fg-1);\n  box-shadow: inset 0 0 0 1px var(--ink-200);\n}\n.btn--secondary:hover { background: var(--ink-050); box-shadow: inset 0 0 0 1px var(--ink-300); }\n\n.btn--brand-ghost {\n  background: var(--teal-100);\n  color: var(--teal-800);\n}\n.btn--brand-ghost:hover { background: var(--teal-200); }\n\n.btn--ghost {\n  background: transparent;\n  color: var(--fg-2);\n}\n.btn--ghost:hover { background: var(--ink-100); color: var(--fg-1); }\n\n.btn--danger {\n  background: var(--sem-danger-mid);\n  color: var(--white);\n}\n\n.btn--block { width: 100%; }\n\n/* ============================================================\n * DATA PILLS — data-type legend (solid tint + colored text).\n * These are DECORATIVE category pills (e.g. \"Coaching\", \"Workouts\"),\n * NOT status. For status use .status--*.\n * ============================================================ */\n\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 10px;\n  border-radius: var(--radius-pill);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  line-height: 1.4;\n  white-space: nowrap;\n}\n.pill--workout   { background: var(--data-workout-bg);   color: var(--data-workout); }\n.pill--nutrition { background: var(--data-nutrition-bg); color: var(--data-nutrition); }\n.pill--sleep     { background: var(--data-sleep-bg);     color: var(--data-sleep); }\n.pill--steps     { background: var(--data-steps-bg);     color: var(--data-steps); }\n.pill--activity  { background: var(--data-activity-bg);  color: var(--data-activity); }\n.pill--hydration { background: var(--data-steps-bg);     color: var(--data-steps); }\n/* Neutral pill */\n.pill--neutral   { background: var(--ink-100); color: var(--fg-2); }\n\n/* Solid filled pill (on dark heroes) */\n.pill--solid {\n  background: var(--ink-900);\n  color: var(--white);\n  padding: 6px 14px;\n  font-size: var(--text-sm);\n}\n\n/* ============================================================\n * STATUS — semantic state pills. \"On Track\", \"Needs Attention\",\n * \"Missed\", \"Session Today\".\n * ============================================================ */\n\n.status {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 12px;\n  border-radius: var(--radius-pill);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  line-height: 1.4;\n  white-space: nowrap;\n}\n.status::before {\n  content: '';\n  display: none;   /* add .status--dot to enable */\n  width: 6px; height: 6px; border-radius: 999px;\n  background: currentColor;\n}\n.status--dot::before { display: inline-block; }\n\n.status--success { background: var(--sem-success-bg); color: var(--sem-success-fg); }\n.status--warn    { background: var(--sem-warn-bg);    color: var(--sem-warn-fg); }\n.status--danger  { background: var(--sem-danger-bg);  color: var(--sem-danger-fg); }\n.status--info    { background: var(--sem-info-bg);    color: var(--sem-info-fg); }\n.status--brand   { background: var(--sem-brand-bg);   color: var(--sem-brand-fg); }\n.status--neutral { background: var(--ink-100);        color: var(--fg-2); }\n\n/* Outlined status (used in Canvas template pills like \"Draft\") */\n.status--outline {\n  background: var(--ink-100);\n  color: var(--fg-3);\n  box-shadow: inset 0 0 0 1px var(--ink-200);\n}\n\n/* ============================================================\n * CARD\n * ============================================================ */\n\n.card {\n  background: var(--white);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow-card);\n  padding: var(--space-6);\n  border: 1px solid var(--border-subtle);\n}\n.card--flat   { box-shadow: none; border: 1px solid var(--border-soft); }\n.card--nested { box-shadow: none; border: 1px solid var(--border-subtle); background: var(--ink-050); }\n.card--hero-dark {\n  background: var(--ink-900);\n  color: var(--white);\n  border-color: var(--ink-800);\n  border-radius: var(--radius-2xl);\n  padding: var(--space-8);\n}\n.card--hero-dark h1, .card--hero-dark h2, .card--hero-dark h3 { color: var(--white); }\n.card--hero-dark .eyebrow { color: rgba(255,255,255,.55); }\n.card--hero-dark .body    { color: rgba(255,255,255,.75); }\n\n/* Card header row — title + actions */\n.card-head {\n  display: flex; align-items: flex-start; justify-content: space-between;\n  gap: var(--space-4); margin-bottom: var(--space-4);\n}\n\n/* ============================================================\n * CHAT BUBBLES\n * ============================================================ */\n\n.bubble {\n  display: inline-block;\n  max-width: 70%;\n  padding: 10px 14px;\n  border-radius: var(--radius-lg);\n  font-size: var(--text-md);\n  line-height: 1.45;\n}\n.bubble--milton {\n  background: var(--grad-milton-bubble);\n  color: var(--white);\n  border-bottom-left-radius: var(--radius-xs);\n  box-shadow: var(--shadow-sm);\n}\n.bubble--user {\n  background: var(--grad-user-bubble);\n  color: var(--fg-1);\n  border: 1px solid var(--border-soft);\n  border-bottom-right-radius: var(--radius-xs);\n}\n\n/* AI copilot \"quoted\" callout — left violet bar, used for rules\n   / workflow context / \"what I know about X\" */\n.quote {\n  position: relative;\n  padding: var(--space-3) var(--space-4) var(--space-3) var(--space-5);\n  background: var(--teal-050);\n  border-radius: 0 var(--radius-md) var(--radius-md) 0;\n  color: var(--fg-2);\n  font-size: var(--text-md);\n  line-height: 1.5;\n}\n.quote::before {\n  content: ''; position: absolute; left: 0; top: 0; bottom: 0;\n  width: 3px; background: var(--teal-600); border-radius: var(--radius-pill);\n}\n.quote--violet     { background: var(--accent-violet-100); }\n.quote--violet::before { background: var(--accent-violet-500); }\n.quote--amber      { background: var(--accent-amber-100); }\n.quote--amber::before  { background: var(--accent-amber-500); }\n.quote--danger     { background: var(--sem-danger-bg); }\n.quote--danger::before { background: var(--sem-danger-mid); }\n\n/* ============================================================\n * INPUT / COMPOSER\n * ============================================================ */\n\n.input {\n  display: block;\n  width: 100%;\n  padding: 10px 14px;\n  border-radius: var(--radius-md);\n  border: 1px solid var(--ink-200);\n  background: var(--white);\n  font: inherit;\n  color: var(--fg-1);\n  transition: border-color var(--dur-fast) var(--ease-out),\n              box-shadow var(--dur-fast) var(--ease-out);\n}\n.input::placeholder { color: var(--fg-4); }\n.input:focus {\n  outline: none;\n  border-color: var(--teal-600);\n  box-shadow: 0 0 0 3px rgba(23, 107, 124, .12);\n}\n\n/* Milton composer — the universal \"Ask Milton…\" bar */\n.composer {\n  display: flex; align-items: center; gap: 8px;\n  padding: 8px 8px 8px 14px;\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  border: 1px solid var(--ink-200);\n  box-shadow: var(--shadow-sm);\n}\n.composer__input {\n  flex: 1; border: 0; background: transparent; outline: 0;\n  font: inherit; font-size: 13px; color: var(--fg-1); padding: 4px 0;\n  min-width: 0;\n}\n.composer__input::placeholder { color: var(--fg-4); }\n.composer__send {\n  width: 36px; height: 36px; border-radius: 999px; border: 0;\n  background: var(--teal-800); color: var(--white); cursor: pointer;\n  display: inline-flex; align-items: center; justify-content: center;\n  transition: background var(--dur-fast) var(--ease-out);\n}\n.composer__send:hover { background: var(--teal-700); }\n.composer__send--muted { background: var(--ink-200); color: var(--white); }\n\n/* ============================================================\n * SUGGESTED-REPLY CHIPS (under chat drawer)\n * ============================================================ */\n\n.chip {\n  display: inline-flex; align-items: center;\n  padding: 8px 14px;\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  border: 1px solid var(--ink-200);\n  font-size: var(--text-sm);\n  color: var(--teal-800);\n  font-weight: var(--weight-medium);\n  cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out),\n              border-color var(--dur-fast) var(--ease-out);\n}\n.chip:hover { background: var(--teal-050); border-color: var(--teal-300); }\n\n/* ============================================================\n * UTILITIES\n * ============================================================ */\n\n.scroll-hide::-webkit-scrollbar { display: none; }\n.scroll-hide { scrollbar-width: none; }\n\n:focus-visible { outline: none; box-shadow: var(--ring); border-radius: inherit; }\n\n/* screen-reader only */\n.sr-only {\n  position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden;\n  clip: rect(0,0,0,0); white-space: nowrap; border: 0;\n}\n\n/* avatar circle */\n.avatar {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 40px; height: 40px; border-radius: 999px;\n  font-weight: var(--weight-semibold); font-size: var(--text-sm);\n  color: var(--white); letter-spacing: .02em; flex-shrink: 0;\n}\n.avatar--sm { width: 32px; height: 32px; font-size: var(--text-xs); }\n.avatar--lg { width: 56px; height: 56px; font-size: var(--text-lg); }\n\n/* Milton mark chip — the square teal tile with the turtle face */\n.milton-mark {\n  display: inline-flex; align-items: center; justify-content: center;\n  background: var(--teal-200);\n  border-radius: 10px;\n  padding: 4px;\n  width: 32px; height: 32px;\n}\n.milton-mark img { width: 100%; height: 100%; object-fit: contain; }\n<\u002Fstyle>\n<script src=\"7d0f348b-5ce3-4c8e-9746-54faab2f1931\"><\u002Fscript>\n<style>\n  body { background: var(--bg-app); }\n  a { color: var(--fg-accent); text-decoration: none; font-weight: 500; }\n  a:hover { color: var(--teal-800); }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:sticky; top:0; z-index:50; background:var(--bg-app); border-bottom:1px solid var(--ink-200); padding:14px 40px; display:flex; align-items:center; gap:16px; font-family:var(--font-sans);\">\n  <div style=\"font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3);\">Palette<\u002Fdiv>\n  <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n    <sc-for list=\"{{ palettes }}\" as=\"p\" hint-placeholder-count=\"4\">\n      <button sc-camel-on-click=\"{{ p.select }}\" style=\"display:flex; align-items:center; gap:8px; padding:7px 14px; border-ra
