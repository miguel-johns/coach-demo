document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f941d7f7-f79a-4fde-bfb4-33afcfcbd325\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"247c0efc-0f78-41c3-b73b-f41dd5e731f7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lexend';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a30c2054-a27f-4c6d-8594-148322f3a7b5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ============================================================\n   * 1. CORE PALETTE\n   * ============================================================ */\n\n  /* Teal — primary brand. Deep teal buttons, headers, the turtle-face.\n     The teal gets darker and more saturated in product than the poster. */\n  --teal-900: #0C5060;\n  --teal-800: #0E5D70;   /* primary button, canvas hero BG */\n  --teal-700: #176B7C;\n  --teal-600: #2A8897;\n  --teal-500: #4BA3AE;\n  --teal-400: #7DBEC4;\n  --teal-300: #A9D3D6;\n  --teal-200: #CFE6E6;   /* pill background, avatar chips */\n  --teal-100: #E4F0F0;\n  --teal-050: #F0F7F7;\n\n  /* Green — success, progress, primary Milton bubble, attendance rings */\n  --green-800: #2F7E3E;\n  --green-700: #3FA053;\n  --green-600: #51B565;\n  --green-500: #6ECB74;   /* chart bars, \"+\" badge, achievements */\n  --green-400: #92DC94;\n  --green-300: #B5EAB1;\n  --green-200: #D4F1CE;\n  --green-100: #E8F7E3;\n  --green-050: #F3FAEF;\n\n  /* Ink — neutrals. Slightly warmer than pure gray, pulls toward teal. */\n  --ink-950: #0B1417;\n  --ink-900: #1A2327;    /* display text */\n  --ink-800: #242D31;\n  --ink-700: #3F4A4E;    /* body text */\n  --ink-600: #5E6A6E;\n  --ink-500: #7D8789;    /* captions, placeholders */\n  --ink-400: #9FA8AB;\n  --ink-300: #C2CACC;\n  --ink-200: #DEE4E5;    /* borders */\n  --ink-150: #EBEEEF;\n  --ink-100: #F3F5F6;    /* app BG */\n  --ink-050: #F9FAFA;    /* subtle wash */\n  --white:   #FFFFFF;\n  --black:   #0B1417;\n\n  /* ============================================================\n   * 2. ACCENT RAMP — Canvas templates, workflow categories,\n   *    chart series, avatars. Each accent has a tint (bg) + solid (fg).\n   *    These are DECORATIVE only — never use for status/state.\n   * ============================================================ */\n\n  /* Peach / coral — used for \"Daily Brief\" template, avatar (Sarah Chen) */\n  --accent-peach-500: #E87560;\n  --accent-peach-200: #F9D7CF;\n  --accent-peach-100: #FDE8E2;\n  /* Red — \"Today's Workout\" template, urgent */\n  --accent-red-500:   #E14D4D;\n  --accent-red-200:   #F9C8C8;\n  --accent-red-100:   #FDDCDC;\n  /* Violet — \"Progress Report\", AI Engine, \"Meetings\" in schedule */\n  --accent-violet-500: #8B5CF6;\n  --accent-violet-200: #DCCFFB;\n  --accent-violet-100: #EDE4FE;\n  /* Blue — \"Exercise Program\", \"Session Today\" pill, body-comp charts */\n  --accent-blue-500:   #3F88F2;\n  --accent-blue-200:   #C7DDFB;\n  --accent-blue-100:   #E2ECFD;\n  /* Green-accent — \"Nutrition Log\" — same family as primary green */\n  /* Pink — \"Recipe View\" template */\n  --accent-pink-500:   #E7539B;\n  --accent-pink-200:   #F9C5DD;\n  --accent-pink-100:   #FCDEEB;\n  /* Teal-accent — \"Meal Selection\" — same family as primary teal */\n  /* Amber — \"Back Office\" in schedule, nutrition accents */\n  --accent-amber-500:  #E89C3A;\n  --accent-amber-200:  #F7DBA8;\n  --accent-amber-100:  #FCEDD2;\n  /* Slate — \"Work Hours\", tertiary chips */\n  --accent-slate-500:  #7788A0;\n  --accent-slate-200:  #CBD2DC;\n  --accent-slate-100:  #E4E8EE;\n\n  /* ============================================================\n   * 3. SEMANTIC — use these for state/status, not accents.\n   * ============================================================ */\n\n  /* Success — On Track, Active, Engaged, goal-hit */\n  --sem-success-fg:  #2D7D3E;\n  --sem-success-bg:  #E2F3DF;\n  --sem-success-mid: var(--green-600);\n\n  /* Warning — Needs Attention, Flagged, Anomaly */\n  --sem-warn-fg:  #9A6409;\n  --sem-warn-bg:  #FDEECC;\n  --sem-warn-mid: var(--accent-amber-500);\n\n  /* Danger — Missed, Needs Programming, Conflict, Assessment Due */\n  --sem-danger-fg:  #A4302E;\n  --sem-danger-bg:  #FBE1DE;\n  --sem-danger-mid: var(--accent-red-500);\n\n  /* Info — Session Today, Client pill, generic informational */\n  --sem-info-fg:  #1F5BA8;\n  --sem-info-bg:  #DCE8F9;\n  --sem-info-mid: var(--accent-blue-500);\n\n  /* Brand / AI — violet for AI-engine / rule / copilot-attributed */\n  --sem-brand-fg:  #6A3FD7;\n  --sem-brand-bg:  var(--accent-violet-100);\n  --sem-brand-mid: var(--accent-violet-500);\n\n  /* ============================================================\n   * 4. SURFACE + TEXT ALIASES — the names you USE most often.\n   * ============================================================ */\n\n  --fg-1: var(--ink-900);          /* display + headers */\n  --fg-2: var(--ink-700);          /* body text */\n  --fg-3: var(--ink-500);          /* captions, eyebrows, tertiary */\n  --fg-4: var(--ink-400);          /* disabled */\n  --fg-on-dark:  var(--white);\n  --fg-on-brand: var(--white);\n  --fg-brand:    var(--teal-800);  /* inline brand words */\n  --fg-accent:   var(--green-700); /* links, progress, active chips */\n  --fg-accent-ink: var(--teal-800);/* in-text accent (Sarah's \"20 lbs\") */\n\n  --bg-app:       var(--ink-100);  /* app background */\n  --bg-canvas:    var(--ink-050);  /* canvas/workspace BG */\n  --bg-1:         var(--white);    /* card surface */\n  --bg-2:         var(--ink-100);  /* subtle inset */\n  --bg-3:         var(--ink-200);  /* deeper inset */\n  --bg-brand:     var(--teal-800); /* primary buttons */\n  --bg-brand-deep:var(--teal-900);\n  --bg-hero-dark: var(--ink-900);  /* black canvas hero cards */\n\n  --border-subtle: var(--ink-150);\n  --border-soft:   var(--ink-200);\n  --border-strong: var(--ink-400);\n  --border-focus:  var(--teal-800);\n\n  /* ============================================================\n   * 5. DATA CATEGORIES — used across dashboards, heatmap legend,\n   *    exercise-program chips. Each has a solid + tint.\n   * ============================================================ */\n\n  --data-workout:   var(--teal-800);   /* \"Workout\" legend, green heatmap */\n  --data-nutrition: var(--accent-red-500);\n  --data-sleep:     var(--accent-violet-500);\n  --data-steps:     var(--accent-blue-500);\n  --data-activity:  var(--accent-amber-500);\n  --data-hydration: var(--accent-blue-500);\n\n  --data-workout-bg:   var(--teal-100);\n  --data-nutrition-bg: var(--accent-red-100);\n  --data-sleep-bg:     var(--accent-violet-100);\n  --data-steps-bg:     var(--accent-blue-100);\n  --data-activity-bg:  var(--accent-amber-100);\n\n  /* ============================================================\n   * 6. MESSAGE BUBBLE — signature Milton gradient\n   * ============================================================ */\n\n  --grad-milton-bubble: linear-gradient(180deg, var(--teal-700) 0%, var(--teal-800) 100%);\n  --grad-user-bubble:   linear-gradient(180deg, var(--ink-100) 0%, var(--ink-150) 100%);\n  /* AI / Copilot \"you said\" quote — violet left border */\n  --grad-ai-quote: linear-gradient(90deg, rgba(139,92,246,.08), rgba(139,92,246,0));\n\n  /* ============================================================\n   * 7. TYPOGRAPHY\n   *   Milton uses Lexend. That's the whole wordmark; never sub.\n   * ============================================================ */\n\n  --font-sans: 'Lexend', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  --text-2xs:  11px;\n  --text-xs:   12px;\n  --text-sm:   13px;\n  --text-md:   14px;\n  --text-base: 15px;    /* product body default */\n  --text-lg:   17px;\n  --text-xl:   20px;\n  --text-2xl:  24px;    /* card title / canvas H2 */\n  --text-3xl:  32px;\n  --text-4xl:  40px;\n  --text-5xl:  56px;    /* stat hero */\n\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  --leading-tight:  1.1;\n  --leading-snug:   1.25;\n  --leading-body:   1.5;\n  --leading-loose:  1.65;\n\n  /* ============================================================\n   * 8. SPACING — 4px grid, use 4/8/12/16/20/24 most often\n   * ============================================================ */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 28px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* ============================================================\n   * 9. RADII\n   * ============================================================ */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:  12px;     /* default card */\n  --radius-lg:  16px;     /* large card, canvas dashboard */\n  --radius-xl:  20px;\n  --radius-2xl: 28px;     /* canvas hero, modal */\n  --radius-pill: 999px;\n\n  /* ============================================================\n   * 10. SHADOWS  — teal-tinted, never pure black\n   * ============================================================ */\n  --shadow-xs:  0 1px 2px rgba(14, 93, 112, .06);\n  --shadow-sm:  0 1px 3px rgba(14, 93, 112, .08), 0 1px 2px rgba(14, 93, 112, .04);\n  --shadow-md:  0 4px 12px rgba(14, 93, 112, .10);\n  --shadow-lg:  0 12px 32px rgba(14, 93, 112, .14);\n  --shadow-xl:  0 28px 60px rgba(14, 93, 112, .20);\n  --shadow-card: 0 1px 0 rgba(14,93,112,.04), 0 2px 8px rgba(14,93,112,.06);\n  --shadow-ring-soft: 0 0 0 1px rgba(14, 93, 112, .06);\n\n  /* ============================================================\n   * 11. MOTION\n   * ============================================================ */\n  --ease-out: cubic-bezier(.2, .8, .2, 1);\n  --ease-in-out: cubic-bezier(.4, 0, .2, 1);\n  --dur-fast: 120ms;\n  --dur-mid:  220ms;\n  --dur-slow: 400ms;\n\n  /* ============================================================\n   * 12. FOCUS\n   * ============================================================ */\n  --ring: 0 0 0 2px var(--white), 0 0 0 4px var(--teal-800);\n}\n\n/* ============================================================\n * BASE RESET\n * ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-body);\n  color: var(--fg-1);\n  background: var(--bg-1);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbutton { font-family: inherit; }\n\n/* ============================================================\n * SEMANTIC TYPE\n * ============================================================ */\n\n.display, h1.display {\n  font-size: var(--text-5xl);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: -.025em;\n  color: var(--fg-1);\n}\nh1, .h1 {\n  font-size: var(--text-4xl);\n  font-weight: var(--weight-bold);\n  line-height: var(--leading-tight);\n  letter-spacing: -.02em;\n  margin: 0;\n}\nh2, .h2 {\n  font-size: var(--text-3xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  letter-spacing: -.015em;\n  margin: 0;\n}\nh3, .h3 {\n  font-size: var(--text-2xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-snug);\n  letter-spacing: -.01em;\n  margin: 0;\n}\nh4, .h4 {\n  font-size: var(--text-xl);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\nh5, .h5 {\n  font-size: var(--text-lg);\n  font-weight: var(--weight-medium);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\n\n.body, p {\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  line-height: var(--leading-body);\n  color: var(--fg-2);\n  margin: 0;\n}\n.body-lg { font-size: var(--text-lg); line-height: 1.55; color: var(--fg-2); }\n.body-sm, small {\n  font-size: var(--text-sm);\n  line-height: 1.5;\n  color: var(--fg-2);\n}\n.caption {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-medium);\n  line-height: 1.4;\n  color: var(--fg-3);\n}\n.eyebrow {\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n.eyebrow--brand { color: var(--fg-brand); }\n\n.mono, code {\n  font-family: var(--font-mono);\n  font-size: .93em;\n  background: var(--bg-2);\n  padding: 2px 6px;\n  border-radius: var(--radius-xs);\n  color: var(--fg-1);\n}\n.num { font-variant-numeric: tabular-nums; }\n\na {\n  color: var(--fg-accent);\n  text-decoration: none;\n  font-weight: var(--weight-medium);\n  transition: color var(--dur-fast) var(--ease-out);\n}\na:hover { color: var(--teal-800); }\n\n/* ============================================================\n * BUTTONS\n * ============================================================ */\n\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--space-2);\n  padding: 10px 18px;\n  border-radius: var(--radius-pill);\n  font-family: var(--font-sans);\n  font-size: var(--text-md);\n  font-weight: var(--weight-semibold);\n  line-height: 1;\n  border: 0;\n  cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out),\n              box-shadow var(--dur-fast) var(--ease-out),\n              transform var(--dur-fast) var(--ease-out),\n              color var(--dur-fast) var(--ease-out);\n  white-space: nowrap;\n  text-decoration: none;\n}\n.btn--sm { padding: 6px 12px; font-size: var(--text-sm); }\n.btn--lg { padding: 14px 24px; font-size: var(--text-lg); }\n\n.btn--primary {\n  background: var(--teal-800);\n  color: var(--white);\n  box-shadow: var(--shadow-sm);\n}\n.btn--primary:hover { background: var(--teal-700); box-shadow: var(--shadow-md); }\n.btn--primary:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }\n\n.btn--dark {\n  background: var(--ink-900);\n  color: var(--white);\n}\n.btn--dark:hover { background: var(--ink-800); }\n\n.btn--secondary {\n  background: var(--white);\n  color: var(--fg-1);\n  box-shadow: inset 0 0 0 1px var(--ink-200);\n}\n.btn--secondary:hover { background: var(--ink-050); box-shadow: inset 0 0 0 1px var(--ink-300); }\n\n.btn--brand-ghost {\n  background: var(--teal-100);\n  color: var(--teal-800);\n}\n.btn--brand-ghost:hover { background: var(--teal-200); }\n\n.btn--ghost {\n  background: transparent;\n  color: var(--fg-2);\n}\n.btn--ghost:hover { background: var(--ink-100); color: var(--fg-1); }\n\n.btn--danger {\n  background: var(--sem-danger-mid);\n  color: var(--white);\n}\n\n.btn--block { width: 100%; }\n\n/* ============================================================\n * DATA PILLS — data-type legend (solid tint + colored text).\n * These are DECORATIVE category pills (e.g. \"Coaching\", \"Workouts\"),\n * NOT status. For status use .status--*.\n * ============================================================ */\n\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 10px;\n  border-radius: var(--radius-pill);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  line-height: 1.4;\n  white-space: nowrap;\n}\n.pill--workout   { background: var(--data-workout-bg);   color: var(--data-workout); }\n.pill--nutrition { background: var(--data-nutrition-bg); color: var(--data-nutrition); }\n.pill--sleep     { background: var(--data-sleep-bg);     color: var(--data-sleep); }\n.pill--steps     { background: var(--data-steps-bg);     color: var(--data-steps); }\n.pill--activity  { background: var(--data-activity-bg);  color: var(--data-activity); }\n.pill--hydration { background: var(--data-steps-bg);     color: var(--data-steps); }\n/* Neutral pill */\n.pill--neutral   { background: var(--ink-100); color: var(--fg-2); }\n\n/* Solid filled pill (on dark heroes) */\n.pill--solid {\n  background: var(--ink-900);\n  color: var(--white);\n  padding: 6px 14px;\n  font-size: var(--text-sm);\n}\n\n/* ============================================================\n * STATUS — semantic state pills. \"On Track\", \"Needs Attention\",\n * \"Missed\", \"Session Today\".\n * ============================================================ */\n\n.status {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 12px;\n  border-radius: var(--radius-pill);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-semibold);\n  line-height: 1.4;\n  white-space: nowrap;\n}\n.status::before {\n  content: '';\n  display: none;   /* add .status--dot to enable */\n  width: 6px; height: 6px; border-radius: 999px;\n  background: currentColor;\n}\n.status--dot::before { display: inline-block; }\n\n.status--success { background: var(--sem-success-bg); color: var(--sem-success-fg); }\n.status--warn    { background: var(--sem-warn-bg);    color: var(--sem-warn-fg); }\n.status--danger  { background: var(--sem-danger-bg);  color: var(--sem-danger-fg); }\n.status--info    { background: var(--sem-info-bg);    color: var(--sem-info-fg); }\n.status--brand   { background: var(--sem-brand-bg);   color: var(--sem-brand-fg); }\n.status--neutral { background: var(--ink-100);        color: var(--fg-2); }\n\n/* Outlined status (used in Canvas template pills like \"Draft\") */\n.status--outline {\n  background: var(--ink-100);\n  color: var(--fg-3);\n  box-shadow: inset 0 0 0 1px var(--ink-200);\n}\n\n/* ============================================================\n * CARD\n * ============================================================ */\n\n.card {\n  background: var(--white);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow-card);\n  padding: var(--space-6);\n  border: 1px solid var(--border-subtle);\n}\n.card--flat   { box-shadow: none; border: 1px solid var(--border-soft); }\n.card--nested { box-shadow: none; border: 1px solid var(--border-subtle); background: var(--ink-050); }\n.card--hero-dark {\n  background: var(--ink-900);\n  color: var(--white);\n  border-color: var(--ink-800);\n  border-radius: var(--radius-2xl);\n  padding: var(--space-8);\n}\n.card--hero-dark h1, .card--hero-dark h2, .card--hero-dark h3 { color: var(--white); }\n.card--hero-dark .eyebrow { color: rgba(255,255,255,.55); }\n.card--hero-dark .body    { color: rgba(255,255,255,.75); }\n\n/* Card header row — title + actions */\n.card-head {\n  display: flex; align-items: flex-start; justify-content: space-between;\n  gap: var(--space-4); margin-bottom: var(--space-4);\n}\n\n/* ============================================================\n * CHAT BUBBLES\n * ============================================================ */\n\n.bubble {\n  display: inline-block;\n  max-width: 70%;\n  padding: 10px 14px;\n  border-radius: var(--radius-lg);\n  font-size: var(--text-md);\n  line-height: 1.45;\n}\n.bubble--milton {\n  background: var(--grad-milton-bubble);\n  color: var(--white);\n  border-bottom-left-radius: var(--radius-xs);\n  box-shadow: var(--shadow-sm);\n}\n.bubble--user {\n  background: var(--grad-user-bubble);\n  color: var(--fg-1);\n  border: 1px solid var(--border-soft);\n  border-bottom-right-radius: var(--radius-xs);\n}\n\n/* AI copilot \"quoted\" callout — left violet bar, used for rules\n   / workflow context / \"what I know about X\" */\n.quote {\n  position: relative;\n  padding: var(--space-3) var(--space-4) var(--space-3) var(--space-5);\n  background: var(--teal-050);\n  border-radius: 0 var(--radius-md) var(--radius-md) 0;\n  color: var(--fg-2);\n  font-size: var(--text-md);\n  line-height: 1.5;\n}\n.quote::before {\n  content: ''; position: absolute; left: 0; top: 0; bottom: 0;\n  width: 3px; background: var(--teal-600); border-radius: var(--radius-pill);\n}\n.quote--violet     { background: var(--accent-violet-100); }\n.quote--violet::before { background: var(--accent-violet-500); }\n.quote--amber      { background: var(--accent-amber-100); }\n.quote--amber::before  { background: var(--accent-amber-500); }\n.quote--danger     { background: var(--sem-danger-bg); }\n.quote--danger::before { background: var(--sem-danger-mid); }\n\n/* ============================================================\n * INPUT / COMPOSER\n * ============================================================ */\n\n.input {\n  display: block;\n  width: 100%;\n  padding: 10px 14px;\n  border-radius: var(--radius-md);\n  border: 1px solid var(--ink-200);\n  background: var(--white);\n  font: inherit;\n  color: var(--fg-1);\n  transition: border-color var(--dur-fast) var(--ease-out),\n              box-shadow var(--dur-fast) var(--ease-out);\n}\n.input::placeholder { color: var(--fg-4); }\n.input:focus {\n  outline: none;\n  border-color: var(--teal-600);\n  box-shadow: 0 0 0 3px rgba(23, 107, 124, .12);\n}\n\n/* Milton composer — the universal \"Ask Milton…\" bar */\n.composer {\n  display: flex; align-items: center; gap: 8px;\n  padding: 8px 8px 8px 14px;\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  border: 1px solid var(--ink-200);\n  box-shadow: var(--shadow-sm);\n}\n.composer__input {\n  flex: 1; border: 0; background: transparent; outline: 0;\n  font: inherit; font-size: 13px; color: var(--fg-1); padding: 4px 0;\n  min-width: 0;\n}\n.composer__input::placeholder { color: var(--fg-4); }\n.composer__send {\n  width: 36px; height: 36px; border-radius: 999px; border: 0;\n  background: var(--teal-800); color: var(--white); cursor: pointer;\n  display: inline-flex; align-items: center; justify-content: center;\n  transition: background var(--dur-fast) var(--ease-out);\n}\n.composer__send:hover { background: var(--teal-700); }\n.composer__send--muted { background: var(--ink-200); color: var(--white); }\n\n/* ============================================================\n * SUGGESTED-REPLY CHIPS (under chat drawer)\n * ============================================================ */\n\n.chip {\n  display: inline-flex; align-items: center;\n  padding: 8px 14px;\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  border: 1px solid var(--ink-200);\n  font-size: var(--text-sm);\n  color: var(--teal-800);\n  font-weight: var(--weight-medium);\n  cursor: pointer;\n  transition: background var(--dur-fast) var(--ease-out),\n              border-color var(--dur-fast) var(--ease-out);\n}\n.chip:hover { background: var(--teal-050); border-color: var(--teal-300); }\n\n/* ============================================================\n * UTILITIES\n * ============================================================ */\n\n.scroll-hide::-webkit-scrollbar { display: none; }\n.scroll-hide { scrollbar-width: none; }\n\n:focus-visible { outline: none; box-shadow: var(--ring); border-radius: inherit; }\n\n/* screen-reader only */\n.sr-only {\n  position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden;\n  clip: rect(0,0,0,0); white-space: nowrap; border: 0;\n}\n\n/* avatar circle */\n.avatar {\n  display: inline-flex; align-items: center; justify-content: center;\n  width: 40px; height: 40px; border-radius: 999px;\n  font-weight: var(--weight-semibold); font-size: var(--text-sm);\n  color: var(--white); letter-spacing: .02em; flex-shrink: 0;\n}\n.avatar--sm { width: 32px; height: 32px; font-size: var(--text-xs); }\n.avatar--lg { width: 56px; height: 56px; font-size: var(--text-lg); }\n\n/* Milton mark chip — the square teal tile with the turtle face */\n.milton-mark {\n  display: inline-flex; align-items: center; justify-content: center;\n  background: var(--teal-200);\n  border-radius: 10px;\n  padding: 4px;\n  width: 32px; height: 32px;\n}\n.milton-mark img { width: 100%; height: 100%; object-fit: contain; }\n<\u002Fstyle>\n<script src=\"7d0f348b-5ce3-4c8e-9746-54faab2f1931\"><\u002Fscript>\n<style>\n  body { background: var(--bg-app); }\n  a { color: var(--fg-accent); text-decoration: none; font-weight: 500; }\n  a:hover { color: var(--teal-800); }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:sticky; top:0; z-index:50; background:var(--bg-app); border-bottom:1px solid var(--ink-200); padding:14px 40px; display:flex; align-items:center; gap:16px; font-family:var(--font-sans);\">\n  <div style=\"font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3);\">Palette<\u002Fdiv>\n  <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n    <sc-for list=\"{{ palettes }}\" as=\"p\" hint-placeholder-count=\"4\">\n      <button sc-camel-on-click=\"{{ p.select }}\" style=\"display:flex; align-items:center; gap:8px; padding:7px 14px; border-radius:999px; border:{{ p.border }}; background:var(--white); cursor:pointer; font-family:var(--font-sans); font-size:12px; font-weight:600; color:var(--fg-1); box-shadow:var(--shadow-xs);\">\n        <span style=\"display:flex; gap:4px;\">\n          <span style=\"width:12px; height:12px; border-radius:999px; background:{{ p.c1 }};\"><\u002Fspan>\n          <span style=\"width:12px; height:12px; border-radius:999px; background:{{ p.c2 }};\"><\u002Fspan>\n          <span style=\"width:12px; height:12px; border-radius:999px; background:{{ p.c3 }};\"><\u002Fspan>\n        <\u002Fspan>\n        <span>{{ p.name }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"font-size:12px; color:var(--fg-3);\">Recolors every card on the canvas<\u002Fdiv>\n<\u002Fdiv>\n<section id=\"4\" style=\"padding:40px; font-family:var(--font-sans); color:var(--fg-1); border-bottom:1px solid var(--ink-200);\">\n  <div style=\"max-width:2400px;\">\n    <div style=\"margin-bottom:8px; font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3);\">Turn 4 · 1080×1080 carousels<\u002Fdiv>\n    <h1 style=\"margin:0 0 6px; font-size:28px; font-weight:700; letter-spacing:-0.02em;\">Square carousel posts<\u002Fh1>\n    <p style=\"margin:0 0 28px; font-size:14px; color:var(--fg-3); max-width:680px;\">Story cards recut as 1080×1080 swipe sequences (<a href=\"#4a\">4a<\u002Fa>–<a href=\"#4f\">4f<\u002Fa>), shown at 1/3 scale. Each row is one post — swipe left to right.<\u002Fp>\n\n    <div style=\"display:flex; flex-direction:column; gap:36px;\">\n\n      <!-- 4a Transformation carousel -->\n      <div id=\"4a\" style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <span style=\"display:inline-flex; align-items:center; justify-content:center; min-width:34px; height:24px; padding:0 8px; border-radius:999px; background:var(--teal-800); color:var(--white) 0','--green-700','--teal-050','--teal-100','--teal-200','--teal-300','--teal-400','--teal-600','--teal-800'];\n  }\n  apply(id) {\n    const def = this.defs.find(d => d.id === id) || this.defs[0];\n    const b = document.body;\n    this.allKeys.forEach(k => b.style.removeProperty(k));\n    Object.entries(def.vars).forEach(([k, v]) => b.style.setProperty(k, v));\n  }\n  componentDidMount() { this.apply(this.state.pal); }\n}<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
